apiVersion: v1
kind: ConfigMap
metadata:
  name: tenants-config
data:
  environment: "development"
  keycloak-url: "http://keycloak.shared-services.svc.cluster.local:8080"
  keycloak-public-url: "https://id.suranku.com"
  platform-frontend-url: "https://platform.suranku.com"
  cors-allow-origins: "https://platform.suranku.com,https://id.suranku.com,https://api.suranku.com,https://home.local.suranku,https://id.local.suranku,https://api.local.suranku"
  keycloak-client-id: "suranku-api"
  # Development-specific Application Base URL for email links (via Kong Gateway)
  app-base-url: "http://api.local.suranku"
  # Cloud-agnostic Storage Configuration (S3-compatible)
  storage-type: "minio"  # Use MinIO for development
  storage-endpoint: "http://suranku-minio.shared-services.svc.cluster.local:9000"  # MinIO endpoint for dev
  storage-bucket-name: "tenants-data"
  storage-region: "us-east-1"
  storage-use-ssl: "false"  # No SSL for local development
  # SMTP Configuration for development
  smtp-host: "smtp.gmail.com"
  smtp-port: "587"
  smtp-use-tls: "true"
  email-from: "admin@suranku.com"
  email-from-name: "SurankuTech Development"
  log-level: "DEBUG"
  # Enable Kafka and provisioning for development
  kafka-enable: "true"
  provisioning-worker-enable: "true"
