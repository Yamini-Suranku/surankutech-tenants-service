# SurankuTech Tenants Service - Infrastructure Configuration
# This file contains environment-specific overrides for different deployment targets

# Global configuration
global:
  namespace: tenant-services
  imageRegistry: docker.io
  imagePullPolicy: IfNotPresent

# Application configuration
app:
  name: tenants-service
  version: v2.4
  replicas: 2
  port: 8000

# Infrastructure overrides for different environments
infrastructure:
  # Vault configuration
  vault:
    enabled: true
    address: "http://suranku-vault.shared-services.svc.cluster.local:8200"
    role: "tenant-services-role"
    serviceAccount: "tenant-services-sa"

    # Secret injection configuration
    secrets:
      keycloakAdmin:
        path: "secret/data/keycloak/platform/admin"
        mountPath: "/vault/secrets/keycloak-admin"
        template: |
          {{- with secret "secret/data/keycloak/platform/admin" -}}
          KEYCLOAK_ADMIN_USERNAME={{ .Data.data.username }}
          KEYCLOAK_ADMIN_PASSWORD={{ .Data.data.password }}
          {{- end -}}

# Environment variables
environment:
  # Application settings
  PORT: "8000"
  ENVIRONMENT: "development"

  # Vault secret file paths
  VAULT_ADMIN_SECRET_FILE_PATH: "/vault/secrets/keycloak-admin"

  # Public application base URL for email links
  APP_BASE_URL: "https://api.suranku.com"

  # Keycloak configuration
  KEYCLOAK_URL: "http://keycloak.shared-services.svc.cluster.local:8080"
  KEYCLOAK_REALM: "suranku-platform"
  KEYCLOAK_CLIENT_ID: "tenants-service"

  # Database (from secrets)
  DATABASE_URL:
    secretKeyRef:
      name: tenants-secrets
      key: database-url

  # Redis (from secrets)
  REDIS_URL:
    secretKeyRef:
      name: tenants-secrets
      key: redis-url

  # Storage configuration (from config/secrets)
  STORAGE_TYPE:
    configMapKeyRef:
      name: tenants-config
      key: storage-type
  STORAGE_ACCESS_KEY:
    secretKeyRef:
      name: tenants-secrets
      key: storage-access-key
  STORAGE_SECRET_KEY:
    secretKeyRef:
      name: tenants-secrets
      key: storage-secret-key
  STORAGE_ENDPOINT:
    configMapKeyRef:
      name: tenants-config
      key: storage-endpoint
  STORAGE_BUCKET_NAME:
    configMapKeyRef:
      name: tenants-config
      key: storage-bucket-name
  STORAGE_REGION:
    configMapKeyRef:
      name: tenants-config
      key: storage-region
  STORAGE_USE_SSL:
    configMapKeyRef:
      name: tenants-config
      key: storage-use-ssl

  # SMTP configuration (from config/secrets)
  SMTP_HOST:
    configMapKeyRef:
      name: tenants-config
      key: smtp-host
  SMTP_PORT:
    configMapKeyRef:
      name: tenants-config
      key: smtp-port
  SMTP_USE_TLS:
    configMapKeyRef:
      name: tenants-config
      key: smtp-use-tls
  SMTP_USER:
    secretKeyRef:
      name: tenants-secrets
      key: smtp-user
  SMTP_PASSWORD:
    secretKeyRef:
      name: tenants-secrets
      key: smtp-password
  EMAIL_FROM:
    configMapKeyRef:
      name: tenants-config
      key: email-from
  EMAIL_FROM_NAME:
    configMapKeyRef:
      name: tenants-config
      key: email-from-name

# Resource configuration
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Health checks
healthChecks:
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Security context
security:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Monitoring
monitoring:
  enabled: true
  blackboxExporter:
    image: "prom/blackbox-exporter:v0.25.0"
    port: 9115
    configMap: tenants-blackbox-config
