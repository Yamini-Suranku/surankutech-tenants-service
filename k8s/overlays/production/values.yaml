# SurankuTech Tenants Service - Production Environment Configuration

# Global configuration
global:
  namespace: tenant-services
  imageRegistry: docker.io
  imagePullPolicy: IfNotPresent

# Application configuration
app:
  name: tenants-service
  version: v2.6
  replicas: 5
  port: 8000

# Infrastructure overrides for production environment
infrastructure:
  # Vault configuration
  vault:
    enabled: true
    address: "https://vault.suranku.com"
    role: "tenant-services-prod-role"
    serviceAccount: "tenant-services-sa"

    # Secret injection configuration
    secrets:
      keycloakAdmin:
        path: "secret/data/keycloak/production/admin"
        mountPath: "/vault/secrets/keycloak-admin"
        template: |
          {{- with secret "secret/data/keycloak/production/admin" -}}
          KEYCLOAK_ADMIN_USERNAME={{ .Data.data.username }}
          KEYCLOAK_ADMIN_PASSWORD={{ .Data.data.password }}
          {{- end -}}

# Environment variables for production
environment:
  # Application settings
  PORT: "8000"
  ENVIRONMENT: "production"

  # Vault secret file paths
  VAULT_ADMIN_SECRET_FILE_PATH: "/vault/secrets/keycloak-admin"

  # Application Base URL for email links (AWS production format)
  APP_BASE_URL: "https://tenants.suranku.com"

  # Keycloak configuration
  KEYCLOAK_URL: "https://id.suranku.com"
  KEYCLOAK_REALM: "suranku-platform"
  KEYCLOAK_CLIENT_ID: "tenants-service"

# Resource configuration for production
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

# Health checks for production
healthChecks:
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    path: /health
    port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5