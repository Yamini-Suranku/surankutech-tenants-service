apiVersion: v1
kind: ConfigMap
metadata:
  name: tenants-config
data:
  environment: "production"
  keycloak-url: "https://id.suranku.com"
  keycloak-public-url: "https://keycloak.suranku.com"
  platform-frontend-url: "https://platform.suranku.com"
  # Production-specific Application Base URL for email links (AWS format)
  app-base-url: "https://tenants.suranku.com"
  # Cloud Storage Configuration for production (AWS S3)
  storage-type: "s3"
  storage-endpoint: ""  # Empty for AWS S3
  storage-bucket-name: "prod-tenants-data"
  storage-region: "us-east-1"
  storage-use-ssl: "true"
  # SMTP Configuration for production
  smtp-host: "smtp.gmail.com"
  smtp-port: "587"
  smtp-use-tls: "true"
  email-from: "admin@suranku.com"
  email-from-name: "SurankuTech"
  log-level: "WARN"
