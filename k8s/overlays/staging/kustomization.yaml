apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resources
resources:
- ../../base

# Environment-specific patches
patchesStrategicMerge:
- configmap-patch.yaml

# Namespace
namespace: tenant-services

# Common labels for all resources in this environment
commonLabels:
  environment: staging
  app.kubernetes.io/component: tenant-service
  app.kubernetes.io/part-of: suranku-platform

# Images
images:
- name: surankutech/tenants-service
  newTag: v0.6.86
