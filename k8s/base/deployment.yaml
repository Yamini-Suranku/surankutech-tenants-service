apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenants-service
  labels:
    app: tenants-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenants-service
  template:
    metadata:
      labels:
        app: tenants-service
        tier: backend
      annotations:
        # Vault Agent Injection annotations
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "tenant-services-role"
        vault.hashicorp.com/agent-inject-secret-keycloak-admin: "secret/data/keycloak/platform/admin"
        vault.hashicorp.com/agent-inject-template-keycloak-admin: |
          {{- with secret "secret/data/keycloak/platform/admin" -}}
          export KEYCLOAK_ADMIN_USERNAME="{{ .Data.data.username }}"
          export KEYCLOAK_ADMIN_PASSWORD="{{ .Data.data.password }}"
          export KEYCLOAK_CLIENT_SECRET="{{ .Data.data.keycloak_client_secret }}"
          {{- end -}}
        vault.hashicorp.com/agent-inject-secret-smtp: "secret/data/shared/smtp"
        vault.hashicorp.com/agent-inject-template-smtp: |
          {{- with secret "secret/data/shared/smtp" -}}
          export SMTP_HOST="{{ .Data.data.host }}"
          export SMTP_PORT="{{ .Data.data.port }}"
          export SMTP_USER="{{ .Data.data.username }}"
          export SMTP_PASSWORD="{{ .Data.data.password }}"
          export EMAIL_FROM="{{ .Data.data.from }}"
          export EMAIL_FROM_NAME="{{ .Data.data.fromDisplayName }}"
          export SMTP_USE_TLS="{{ .Data.data.starttls }}"
          {{- end -}}
    spec:
      serviceAccountName: tenant-services-sa
      containers:
      - name: tenants-service
        image: surankutech/tenants-service:v0.6.82
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: environment
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tenants-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: tenants-secrets
              key: redis-url
        - name: KEYCLOAK_URL
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: keycloak-url
        - name: KEYCLOAK_PUBLIC_URL
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: keycloak-public-url
        - name: KEYCLOAK_REALM
          value: "suranku-platform"
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: keycloak-client-id
        - name: DARKHOLE_SERVICE_URL
          value: "http://darkhole-api.darkhole.svc.cluster.local"
        # Cloud-agnostic Object Storage (S3-compatible)
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: storage-type
        - name: STORAGE_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: tenants-secrets
              key: storage-access-key
        - name: STORAGE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tenants-secrets
              key: storage-secret-key
        - name: STORAGE_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: storage-endpoint
        - name: STORAGE_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: storage-bucket-name
        - name: STORAGE_REGION
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: storage-region
        - name: STORAGE_USE_SSL
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: storage-use-ssl
        # Vault configuration
        - name: VAULT_ADDR
          value: "http://suranku-vault.shared-services.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: tenants-secrets
              key: vault-token
        - name: VAULT_ADMIN_SECRET_FILE_PATH
          value: "/vault/secrets/keycloak-admin"
        - name: VAULT_SMTP_SECRET_FILE_PATH
          value: "/vault/secrets/smtp"
        # Application Base URL for email links
        - name: APP_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: app-base-url
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: frontend-url
        - name: CORS_ALLOW_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: cors-allow-origins
        - name: PLATFORM_FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: platform-frontend-url
        # Kafka / provisioning events
        - name: KAFKA_ENABLE
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: kafka-enable
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: kafka-bootstrap-servers
        - name: KAFKA_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: kafka-client-id
        - name: TENANT_EVENTS_TOPIC
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: tenant-events-topic
        - name: TENANT_PROVISIONING_TOPIC
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: tenant-provisioning-topic
        - name: PROVISIONING_WORKER_ENABLE
          valueFrom:
            configMapKeyRef:
              name: tenants-config
              key: provisioning-worker-enable
        # Cert-manager configuration
        - name: CERT_MANAGER_CLUSTER_ISSUER
          value: "local-ca"
        # DNS configuration for domain provisioning
        - name: LOCAL_DATA_PLANE_DOMAIN
          value: "local.suranku"
        - name: DATA_PLANE_DOMAIN
          value: "suranku.net"
        # Credential backend configuration
        - name: CREDENTIAL_BACKEND
          value: "vault"
        - name: SQLALCHEMY_POOL_SIZE
          value: "20"
        - name: SQLALCHEMY_MAX_OVERFLOW
          value: "20"
        - name: SQLALCHEMY_POOL_TIMEOUT
          value: "60"
        - name: SQLALCHEMY_POOL_RECYCLE
          value: "300"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "750m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      - name: tenants-health-exporter
        image: prom/blackbox-exporter:v0.25.0
        args:
          - "--config.file=/etc/blackbox/blackbox.yml"
        ports:
          - containerPort: 9115
            name: metrics
        volumeMounts:
          - name: tenants-blackbox-config
            mountPath: /etc/blackbox
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        - name: tenants-blackbox-config
          configMap:
            name: tenants-blackbox-config
