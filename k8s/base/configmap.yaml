apiVersion: v1
kind: ConfigMap
metadata:
  name: tenants-config
data:
  # Base configuration - override in environment-specific overlays
  environment: "development"
  keycloak-url: "http://keycloak.shared-services.svc.cluster.local:8080"
  app-base-url: "http://localhost:8000"  # Default fallback
  # Storage Configuration
  storage-type: "s3"
  storage-endpoint: ""
  storage-bucket-name: "tenants-data"
  storage-region: "us-east-1"
  storage-use-ssl: "true"
  # SMTP Configuration
  smtp-host: "smtp.gmail.com"
  smtp-port: "587"
  smtp-use-tls: "true"
  email-from: "admin@example.com"
  email-from-name: "SurankuTech"
  log-level: "INFO"
  # Kafka / provisioning
  kafka-enable: "false"
  kafka-bootstrap-servers: "kafka.messaging.svc.cluster.local:29092"
  kafka-client-id: "tenants-service"
  tenant-events-topic: "tenant.events.v1"
  tenant-provisioning-topic: "tenant.provisioning.v1"
  provisioning-worker-enable: "false"
